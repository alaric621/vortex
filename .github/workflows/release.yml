name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm run test:run

      - name: Package VSIX
        run: npx @vscode/vsce package -o vortex-${{ github.ref_name }}.vsix

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: vortex-${{ github.ref_name }}.vsix
          generate_release_notes: true
